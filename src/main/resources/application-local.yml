server:
  shutdown: graceful

spring:
  datasource:
    url: jdbc:h2:mem:pointdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  jackson:
    time-zone: Asia/Seoul

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    org.hibernate.SQL: debug
