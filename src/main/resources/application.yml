server:
  port: 8080

spring:
  profiles:
    active: local
  application:
    name: point-api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /swagger-ui/api-docs
  swagger-ui:
    path: /api-test
    operations-sorter: method
    tags-sorter: alpha
