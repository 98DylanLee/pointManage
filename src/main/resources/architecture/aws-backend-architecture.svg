<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Point API AWS Architecture</title>
  <desc id="desc">Assignment-oriented AWS deployment architecture for the point backend service.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f7fb"/>
      <stop offset="100%" stop-color="#e3eefc"/>
    </linearGradient>
    <linearGradient id="awsBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f9ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#15314b" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27577f"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, sans-serif; fill: #14324d; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #46627b; }
      .group-title { font: 700 24px Arial, sans-serif; fill: #173a59; }
      .label { font: 700 20px Arial, sans-serif; fill: #173a59; }
      .body { font: 400 16px Arial, sans-serif; fill: #36536c; }
      .small { font: 400 14px Arial, sans-serif; fill: #4d6a82; }
      .box { fill: url(#awsBox); stroke: #9bb7d1; stroke-width: 2; rx: 24; }
      .accent { fill: #173a59; }
      .arrow { fill: none; stroke: #27577f; stroke-width: 4; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 10 8; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <text x="90" y="86" class="title">Point API Assignment Architecture</text>
  <text x="90" y="122" class="subtitle">AWS deployment assumption for a Spring Boot point service with future earn, use, cancel, and expire workflows.</text>

  <rect x="70" y="170" width="1460" height="730" rx="34" fill="none" stroke="#7ea4c5" stroke-width="3"/>
  <text x="104" y="210" class="group-title">AWS Account / ap-northeast-2</text>

  <rect class="box" filter="url(#shadow)" x="110" y="270" width="260" height="120"/>
  <text x="145" y="320" class="label">Client / Admin Tool</text>
  <text x="145" y="350" class="body">29CM reviewer, Postman, browser</text>

  <rect class="box" filter="url(#shadow)" x="430" y="250" width="280" height="160"/>
  <text x="465" y="300" class="label">Route 53 + CloudFront</text>
  <text x="465" y="332" class="body">Custom domain and TLS</text>
  <text x="465" y="360" class="body">Static docs / API gateway edge</text>

  <rect class="box" filter="url(#shadow)" x="790" y="230" width="300" height="200"/>
  <text x="825" y="282" class="label">ALB + ECS Fargate</text>
  <text x="825" y="314" class="body">Spring Boot `point-api` container</text>
  <text x="825" y="344" class="body">REST endpoints: /api/v1/points/*</text>
  <text x="825" y="374" class="body">Swagger UI / Actuator</text>

  <rect class="box" filter="url(#shadow)" x="1180" y="250" width="270" height="160"/>
  <text x="1215" y="300" class="label">Secrets Manager / SSM</text>
  <text x="1215" y="332" class="body">DB credentials</text>
  <text x="1215" y="360" class="body">Runtime configuration</text>

  <rect class="box" filter="url(#shadow)" x="240" y="520" width="320" height="180"/>
  <text x="275" y="574" class="label">RDS PostgreSQL</text>
  <text x="275" y="606" class="body">point_wallet</text>
  <text x="275" y="634" class="body">point_ledger</text>
  <text x="275" y="662" class="body">point_policy / order</text>

  <rect class="box" filter="url(#shadow)" x="650" y="520" width="320" height="180"/>
  <text x="685" y="574" class="label">SQS / EventBridge</text>
  <text x="685" y="606" class="body">expire scheduling</text>
  <text x="685" y="634" class="body">async integration events</text>
  <text x="685" y="662" class="body">future point workflows</text>

  <rect class="box" filter="url(#shadow)" x="1060" y="520" width="340" height="180"/>
  <text x="1095" y="574" class="label">CloudWatch + X-Ray</text>
  <text x="1095" y="606" class="body">application logs</text>
  <text x="1095" y="634" class="body">metrics, alarms, traces</text>
  <text x="1095" y="662" class="body">assignment observability story</text>

  <path class="arrow" d="M 370 330 C 390 330, 404 330, 430 330"/>
  <path class="arrow" d="M 710 330 C 735 330, 760 330, 790 330"/>
  <path class="arrow" d="M 1090 330 C 1120 330, 1140 330, 1180 330"/>
  <path class="arrow" d="M 930 430 C 870 470, 820 500, 790 520"/>
  <path class="arrow" d="M 860 430 C 760 490, 620 530, 560 570"/>
  <path class="arrow" d="M 990 430 C 1090 490, 1140 520, 1180 560"/>
  <path class="arrow dashed" d="M 970 610 C 1000 610, 1030 610, 1060 610"/>

  <rect x="110" y="760" width="1290" height="90" rx="24" fill="#173a59" opacity="0.94"/>
  <text x="145" y="810" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Assignment scope today</text>
  <text x="430" y="810" font-family="Arial, sans-serif" font-size="19" fill="#d9e6f3">Earn API implemented now, but the architecture leaves room for use, cancel, expire batch, and external integrations.</text>
</svg>
